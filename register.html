<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Event Registration - Upgrad Events</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid px-3">
      <a class="navbar-brand fw-bold" href="index.html">Upgrad Events</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navMenu">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
          <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <h3 class="mb-4">Event Registration</h3>

    <!-- Event Details Card -->
    <div class="card mb-4 p-3">
      <h6 class="fw-semibold">Event Details</h6>
      <p class="mb-1"><strong>ID:</strong> <span id="regEventId"></span></p>
      <p class="mb-1"><strong>Name:</strong> <span id="regEventName"></span></p>
      <p class="mb-1"><strong>Category:</strong> <span id="regEventCategory"></span></p>
      <p class="mb-1"><strong>Date:</strong> <span id="regEventDate"></span></p>
      <p class="mb-0"><strong>Time:</strong> <span id="regEventTime"></span></p>
    </div>

    <!-- Participant Details Card -->
    <div class="card p-3">
      <h6 class="fw-semibold mb-3">Participant Details</h6>
      <div class="mb-3">
        <input type="text" id="firstName" class="form-control" placeholder="First Name" required />
      </div>
      <div class="mb-3">
        <input type="text" id="lastName" class="form-control" placeholder="Last Name" required />
      </div>
      <div class="mb-3">
        <input type="email" id="partEmail" class="form-control" placeholder="Email" required />
      </div>
      <button class="btn btn-success" onclick="registerParticipant()">Register</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/db.js"></script>
  <script src="js/register.js"></script>
</body>
</html>

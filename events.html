<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Events - Upgrad Events</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid px-3">
      <a class="navbar-brand fw-bold" href="index.html">Upgrad Events</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navMenu">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
          <li class="nav-item"><a class="nav-link active" href="events.html">Events</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0">Manage Events</h4>
      <button class="btn btn-danger btn-sm" onclick="logoutAdmin()">Logout</button>
    </div>

    <!-- Add Event Form -->
    <div class="card p-3 mb-4">
      <h6 class="fw-semibold mb-3">Add Event</h6>
      <div class="mb-2">
        <input type="text" id="evtId" class="form-control" placeholder="Event ID" required />
      </div>
      <div class="mb-2">
        <input type="text" id="evtName" class="form-control" placeholder="Event Name" required />
      </div>
      <div class="mb-2">
        <select id="evtCategory" class="form-select" required>
          <option value="" disabled selected>Select Category</option>
          <option value="Tech &amp; Innovations">Tech &amp; Innovations</option>
          <option value="Industrial Event">Industrial Event</option>
          <option value="Business &amp; Finance">Business &amp; Finance</option>
          <option value="Health &amp; Wellness">Health &amp; Wellness</option>
        </select>
      </div>
      <div class="mb-2">
        <input type="date" id="evtDate" class="form-control" required />
      </div>
      <div class="mb-2">
        <input type="time" id="evtTime" class="form-control" required />
      </div>
      <div class="mb-2">
        <input type="url" id="evtUrl" class="form-control" placeholder="Event URL" required />
      </div>
      <button class="btn btn-success btn-sm" onclick="addEvent()">Add Event</button>
    </div>

    <!-- Search Section -->
    <div class="card p-3 mb-4">
      <h6 class="fw-semibold mb-2">Search Event</h6>
      <div class="row g-2">
        <div class="col-md-4">
          <select id="searchField" class="form-select form-select-sm">
            <option value="id">ID</option>
            <option value="name">Name</option>
            <option value="category" selected>Category</option>
          </select>
        </div>
        <div class="col-md-5">
          <input type="text" id="searchValue" class="form-control form-control-sm" placeholder="Search value..." />
        </div>
        <div class="col-md-3">
          <button class="btn btn-primary btn-sm w-100" onclick="searchEvents()">Search</button>
        </div>
      </div>
      <div class="mt-2">
        <button class="btn btn-link btn-sm p-0 text-secondary" onclick="loadAllEvents()">Clear Search</button>
      </div>
    </div>

    <!-- Events Cards -->
    <div class="row" id="adminEventCards"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/db.js"></script>
  <script src="js/events.js"></script>
</body>
</html>
